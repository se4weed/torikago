name: CI

on:
  push:

permissions:
  contents: read

jobs:
  root:
    name: Root / Ruby ${{ matrix.ruby-label }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby-version: "4.0.5"
            ruby-label: "4.0.5"
          - ruby-version: ruby-head
            ruby-label: "4.1-dev"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup bundle
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: rbs validate
        run: bundle exec rbs validate

      - name: steep check
        run: bundle exec steep check

      - name: rake test
        run: bundle exec rake test

      - name: rake test (RUBY_BOX=true)
        run: bundle exec rake test
        env:
          RUBY_BOX: "true"

  rails-modular-monolith:
    name: rails-modular-monolith / Ruby ${{ matrix.ruby-label }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby-version: "4.0.5"
            ruby-label: "4.0.5"
          - ruby-version: ruby-head
            ruby-label: "4.1-dev"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup bundle
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          working-directory: example/rails-modular-monolith

      - name: Install module bundles
        run: |
          BUNDLE_GEMFILE=modules/foo/Gemfile bundle install --system
          BUNDLE_GEMFILE=modules/bar/Gemfile bundle install --system
        working-directory: example/rails-modular-monolith

      - name: Test
        run: bundle exec bin/box-rails test
        working-directory: example/rails-modular-monolith
        env:
          RUBYLIB: ${{ github.workspace }}/lib

  rails-modular-monolith-with-rails-engine:
    name: rails-modular-monolith-with-rails-engine / Ruby ${{ matrix.ruby-label }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby-version: "4.0.5"
            ruby-label: "4.0.5"
          - ruby-version: ruby-head
            ruby-label: "4.1-dev"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup bundle
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          working-directory: example/rails-modular-monolith-with-rails-engine

      - name: Install module bundles
        run: |
          BUNDLE_GEMFILE=modules/foo/Gemfile bundle install --system
          BUNDLE_GEMFILE=modules/bar/Gemfile bundle install --system
        working-directory: example/rails-modular-monolith-with-rails-engine

      - name: Test
        run: bundle exec bin/box-rails test
        working-directory: example/rails-modular-monolith-with-rails-engine
        env:
          RUBYLIB: ${{ github.workspace }}/lib
