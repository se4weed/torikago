name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  root:
    name: Root / Ruby ${{ matrix.ruby-label }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby-version: "4.0.5"
            ruby-label: "4.0.5"
          - ruby-version: ruby-head
            ruby-label: "4.1-dev"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup bundle
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: rbs validate
        run: bundle exec rbs validate

      - name: steep check
        run: bundle exec steep check

      - name: Install test gems
        run: |
          gem install rake -v 13.3.1 --no-document
          gem install rake -v 13.4.2 --no-document
          gem install minitest --no-document

      - name: Set test RUBYLIB
        run: |
          ruby -e 'paths = ["lib", *Gem::Specification.find_by_name("rake", "= 13.4.2").full_require_paths]; File.open(ENV.fetch("GITHUB_ENV"), "a") { |file| file.puts("RUBYLIB=#{paths.join(File::PATH_SEPARATOR)}") }'

      - name: rake test
        run: rake test

      - name: rake test (RUBY_BOX=true)
        run: rake test
        env:
          RUBY_BOX: "1"

  rails-modular-monolith:
    name: rails-modular-monolith / Ruby ${{ matrix.ruby-label }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby-version: "4.0.5"
            ruby-label: "4.0.5"
          - ruby-version: ruby-head
            ruby-label: "4.1-dev"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: ${{ matrix.ruby-version }}

      - name: Install bundles
        run: bin/bundle-install example/rails-modular-monolith

      - name: Test
        run: bundle exec bin/box-rails test
        working-directory: example/rails-modular-monolith
        env:
          RUBYLIB: ${{ github.workspace }}/lib

  rails-modular-monolith-with-rails-engine:
    name: rails-modular-monolith-with-rails-engine / Ruby ${{ matrix.ruby-label }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby-version: "4.0.5"
            ruby-label: "4.0.5"
          - ruby-version: ruby-head
            ruby-label: "4.1-dev"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: ${{ matrix.ruby-version }}

      - name: Install bundles
        run: bin/bundle-install example/rails-modular-monolith-with-rails-engine

      - name: Test
        run: bundle exec bin/box-rails test
        working-directory: example/rails-modular-monolith-with-rails-engine
        env:
          RUBYLIB: ${{ github.workspace }}/lib
