name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gem:
    name: Gem
    runs-on:
      - self-hosted
      - ruby-box
    env:
      RUBY_BOX: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Ruby runtime
        run: |
          ruby -v
          ruby -e 'abort "Ruby::Box is not available on this runner" unless defined?(Ruby::Box)'
          echo "$(ruby -rrbconfig -e 'print RbConfig::CONFIG.fetch("bindir")')" >> "$GITHUB_PATH"

      - name: Cache gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gem-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gem-

      - name: Install dependencies
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Run tests
        run: bundle exec rake test

      - name: Run type check
        run: bundle exec steep check --severity-level=error -j 1
